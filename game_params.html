<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Paramètres</title>

<!-- appel FONTAWESOME -->
<link href="css/css_fontawesome/fontawesome.css" rel="stylesheet" />
<link href="css/css_fontawesome/brands.css" rel="stylesheet" />
<link href="css/css_fontawesome/thin.css" rel="stylesheet" />
<link href="css/css_fontawesome/light.css" rel="stylesheet" />
<link href="css/css_fontawesome/regular.css" rel="stylesheet" />
<link href="css/css_fontawesome/solid.css" rel="stylesheet" />
<!-- appel FONT -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<!-- appel BOOTSTRAP -->
<link href="dist_bootstrap/css/bootstrap.min.css" rel="stylesheet">
<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="game-container">
  <h2 data-i18n="param_title"></h2>
  
  <!-- Accordion -->
  <div class="accordion" id="accordionParams"> 
    
    <!-- LANGUE -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseLang" data-i18n="param_langue_title"></button>
      </h2>
      <div id="collapseLang" class="accordion-collapse collapse">
        <div class="accordion-body">
          <button class="btn btn-outline-primary w-100 mb-2 lang-btn" onclick="setLanguage('fr')" data-i18n="param_choice_fr"></button>
          <button class="btn btn-outline-primary w-100 mb-2 lang-btn" onclick="setLanguage('uk')" data-i18n="param_choice_uk"></button>
          <button class="btn btn-outline-primary w-100 mb-2 lang-btn" onclick="setLanguage('es')" data-i18n="param_choice_es"></button>
          <button class="btn btn-outline-primary w-100 mb-2 lang-btn" onclick="setLanguage('it')" data-i18n="param_choice_it"></button>
          <button class="btn btn-outline-primary w-100 mb-2 lang-btn" onclick="setLanguage('pt')" data-i18n="param_choice_pt"></button>
        </div>
      </div>
    </div>
  </div>
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSound" data-i18n="param_sound_title"></button>
    </h2>
    <div id="collapseSound" class="accordion-collapse collapse show">
      <div class="accordion-body"> 
        
        <!-- SFX -->
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="toggleSFX">
          <label class="form-check-label" for="toggleSFX" data-i18n="param_sound_sfx"></label>
        </div>
        
        <!-- MUSIC -->
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="toggleMusic">
          <label class="form-check-label" for="toggleMusic" data-i18n="param_sound_music"></label>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Bouton retour -->
  <div class="mt-4">
    <button class="btn btn-secondary w-100" onclick="goBack()" data-i18n="param_back"></button>
  </div>
</div>

<!-- appel LANGUE --> 
<script src="scripts/i18n/fr.js"></script> 
<script src="scripts/i18n/uk.js"></script> 
<script src="scripts/i18n/es.js"></script> 
<script src="scripts/i18n/it.js"></script> 
<script src="scripts/i18n/pt.js"></script> 
<script src="scripts/js_langchoice.js"></script> 
<script src="scripts/js_audio.js"></script> 
<!-- appel ROUTES --> 
<script src="scripts/js_routes.js"></script> 
<!-- appel BOOTSTRAP --> 
<script src="dist_bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
