<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Tutoriel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="game-container">
  <div class="top-bar">
    <div class="target-box" id="target"></div>
    <button id="pauseBtn" data-i18n="game_pause"></button>
    <button id="toolsBtn" data-i18n="game_params" onclick="goToParams()"></button>
  </div>
  <div class="current-sum">
    <span data-i18n="game_current_sum">
    </span>
    <span id="currentSumValue">
      0
    </span>
    <span class="separator">
      |
    </span>
    <span data-i18n="game_score">
    </span>
    <span id="scoreValue">
      0
    </span>
  </div>
  <div class="time-container">
    <div class="time-bar" id="timeBar"></div>
  </div>
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="buttons">
    <button id="refresh" data-i18n="game_refresh"></button>
    <button id="reset" data-i18n="game_reset"></button>
    <button id="quit" data-i18n="game_quit"></button>
  </div>
</div>

<!-- MODALE -->
<div class="tutorial-modal" id="tutorialModal">
  <div class="tutorial-box">
    <h3 id="tutoTitle"></h3>
    <p id="tutoText"></p>
    <div class="tutorial-actions">
      <button id="modalPrev" onclick="prevStep()"></button>
      <button id="modalNext" onclick="nextStep()"></button>
      <button id="modalQuit" onclick="goToMenu()"></button>
    </div>
  </div>
</div>
<script src="scripts/js_include.js"></script>
</body>
</html>
